<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse V5</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="sidebar">
<h1>PULSE</h1>
<button>Home</button>
<button>Explore</button>
<button>Music</button>
<button>Admin</button>
</div>
<div class="feed">
<div class="topbar">
<input placeholder="Search Pulse">
<button>Create Account</button>
<button>Login</button>
</div>

<div class="composer">
<h2>Create Post</h2>
<textarea placeholder="What's pulsing?"></textarea>
<input type="file" accept="image/*">
<input placeholder="Spotify or YouTube link">
<div class="music-history">🎵 Recent music history</div>
<button>Post</button>
</div>

<div class="post">
<h3>@pulseuser <span class="verified">✓</span></h3>
<img src="https://picsum.photos/500/300" />
<p>Late night energy.</p>
<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2takcwOaAZWiXQijPHIx7B" width="100%" height="80" frameborder="0" allowfullscreen="" allow="autoplay"></iframe>
</div>
</div>
</body>
</html>
